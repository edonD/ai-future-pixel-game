<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI FUTURE</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="touch-controls">
        <div id="dpad">
            <button id="btn-up" class="dpad-btn">&#9650;</button>
            <button id="btn-left" class="dpad-btn">&#9664;</button>
            <button id="btn-right" class="dpad-btn">&#9654;</button>
            <button id="btn-down" class="dpad-btn">&#9660;</button>
        </div>
        <div id="action-buttons">
            <button id="btn-jump" class="action-btn">A</button>
            <button id="btn-attack" class="action-btn">B</button>
        </div>
    </div>
    <script src="js/audio.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/player.js"></script>
    <script src="js/enemies.js"></script>
    <script src="js/levels.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
